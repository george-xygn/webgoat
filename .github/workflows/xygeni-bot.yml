# This file is automatically generated by Xygeni Bot Configuration.
# WARNING: Manual changes may be overwritten.
name: Xygeni Bot
on:
  workflow_dispatch:  # Allows manual triggering
  # no push triggers
  # no pull request triggers
  # no schedule triggers

permissions:
  contents: write
  pull-requests: write

jobs:
  xygeni-bot:
    name: Xygeni Bot
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          fetch-depth: 0  # Shallow clones are not required 

      - name: Xygeni-Scanner
        uses: xygeni/xygeni-action@13c6ed2797df7d85749864e2cbcf09c893f43b23
        id: Xygeni-Scanner
        with:
          command: scan --run=deps,secrets,sast --auto-remediate --no-upload --format none
          xygeni_url: https://api.xygeni.io
          token: ${{ secrets.XYGENI_TOKEN }}
          # run PR from actions should be enabled
          gh_token: ${{ secrets.GITHUB_TOKEN }} 

